name: Autograding Tests

on:
  push:
    branches: [main]

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Task 1: Session Storage"
        id: task1
        run: pytest tests/test_session.py -v
        if: always()

      - name: "Task 2: Rate Limiter"
        id: task2
        run: pytest tests/test_rate_limiter.py -v
        if: always()

      - name: "Task 3: Task Queue"
        id: task3
        run: pytest tests/test_queue.py -v
        if: always()

      - name: "Bonus: Sliding Window"
        id: bonus
        run: pytest tests/test_sliding_window.py -v
        if: always()

      - name: Results
        if: always()
        run: |
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Session Storage | ${{ steps.task1.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rate Limiter | ${{ steps.task2.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Queue | ${{ steps.task3.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sliding Window (bonus) | ${{ steps.bonus.outcome }} |" >> $GITHUB_STEP_SUMMARY
